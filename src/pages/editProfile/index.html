<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <nav class="logo">
        <img src="/public/assets/icons.jpg" alt="Logo Netflix">
    </nav>


    <h1>Editar Perfil</h1>


    <main>
        <section class="profile-container">
            <img id="profileImg" width="120">

            <button class="edit-icon" onclick="openImageSelector()">
                ✏️
            </button>
        </section>


        <section class="info">
            <div class="input-group">
                <input type="text" id="nameInput" required>
                <label for="nameInput">Nome</label>
            </div>
    
            <div class="language-selector">
                <p>Idioma:</p>
                <button class="language-button">
                    🌐 <span id="currentLanguage">Português</span>
                </button>
            </div>
        </section>
    </main>


    <!-- Popup -->
    <section id="imageModal" class="modal hidden" onclick="closeModal(event)">
        <div class="modal-content">
            <h2>Escolha um avatar:</h2>

            <div class="images-grid">
                <img src="/public/assets/perfil-1.jpg" onclick="selectImage(this.src)">
                <img src="/public/assets/perfil-2.jpg" onclick="selectImage(this.src)">
                <img src="/public/assets/perfil-3.jpg" onclick="selectImage(this.src)">
                <img src="/public/assets/perfil-4.jpg" onclick="selectImage(this.src)">

                <img src="/public/assets/kids-1.jpg" onclick="selectImage(this.src)">
                <img src="/public/assets/kids-2.png" onclick="selectImage(this.src)">
                <img src="/public/assets/kids-3.png" onclick="selectImage(this.src)">
                <img src="/public/assets/kids-4.png" onclick="selectImage(this.src)">
            </div>
        </div>
    </section>

    <hr>

    <section class="classificacao-etaria">
        <p>Configurações de classificação etária:</h3>
            
        <div class="classificacao" id="ratingButton">
            TODAS AS CLASSIFICAÇÕES ETÁRIAS
        </div>

        <p>Mostrar títulos de <b id="ratingText">todas as classificações etárias</b> para este perfil</p>

        <button class="edit" onclick="openRatingOptions()">
            Editar
        </button>
    </section >

    <hr>

    <section class="buttons">
        <button class="button save" onclick="save()">
            SALVAR
        </button>

        <button class="button" onclick="cancel()">
            CANCELAR
        </button>

        <button class="button" onclick="remove()">
            EXCLUIR PERFIL
        </button>
    </section>


    <script src="script.js"></script>
</body>
</html>
